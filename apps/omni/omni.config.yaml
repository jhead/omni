gateway:
  httpPort: 8080
  httpHostname: "127.0.0.1"
  ipcSocketPath: ./data/omni-gateway.sock
  dbPath: ./data/omni.sqlite

omniServer:
  hostname: "127.0.0.1"
  port: 9090
  bearerToken: "change-me"

# In-process Anthropic proxy (default). Agents use ANTHROPIC_BASE_URL → listen URL.
# Set upstreamBaseUrl to the real API (override with OMNI_UPSTREAM_BASE_URL).
omnirouter:
  enabled: true
  listen:
    hostname: "127.0.0.1"
    port: 3456
  upstreamBaseUrl: "https://api.anthropic.com"
  passthrough: true
  # passthrough: false
  # model: "claude-haiku-4-5-20251001"
  # toolAllowlist: ["Read", "Write", "Bash"]

agents:
  baseDir: ./data/agents
  # With `channel-agent-bus`, each MCP session auto-subscribes to this topic (default: omni-agents). Set to null to disable.
  # agentBusAutoSubscribeTopic: omni-agents
  # Spawn defaults and templateDir live in the `default` agent template (GET/PATCH /api/agent-templates/default).
  # Required only when omnirouter.enabled is false (external router):
  # omnirouterUrl: "http://127.0.0.1:3456"

channels:
  demo:
    plugin: channel-webhook
  agent-bus:
    plugin: channel-agent-bus
